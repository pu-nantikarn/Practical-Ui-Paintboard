7;input[type=\&quot;file\&quot;]&#x27;).selectFile(&#x27;cypress/fixtures/picture.jpg&#x27;, {\n  force: true\n});\n// 3. เช็คว่ารูปภาพถูกเรนเดอร์ขึ้นมาบนหน้าจอ (เช็คจากคลาส .preview-image)\ncy.get(&#x27;.preview-image&#x27;, {\n  timeout: 10000\n}).should(&#x27;be.visible&#x27;);\n// 4. รอให้อัลกอริทึม Clustering ทำงาน \n// เมื่อทำงานเสร็จ ปุ่มที่มีคลาส .toggle-all-colors-btn จะโผล่ขึ้นมาตามเงื่อนไข allExtractedColors.length &gt; 0\ncy.get(&#x27;.toggle-all-colors-btn&#x27;, {\n  timeout: 10000\n}).should(&#x27;be.visible&#x27;).and(&#x27;contain.text&#x27;, &#x27;ดูสีทั้งหมดที่ดึงได้&#x27;);\n// 5. สั่งให้บอทกดปุ่มเพื่อเปิด \&quot;หน้าต่างสีทั้งหมด (All Colors Panel)\&quot;\ncy.get(&#x27;.toggle-all-colors-btn&#x27;).click();\n// 6. ตรวจสอบว่าในหน้าต่างที่สไลด์ออกมา มีกล่องสี (.all-color-item) ปรากฏอยู่\ncy.get(&#x27;.all-color-item&#x27;).should(&#x27;be.visible&#x27;).and(&#x27;have.length.at.least&#x27;, 1);\n// 7. ตรวจสอบว่าระบบนำสีที่สกัดได้ ไปใส่ในช่อง Primary Color อัตโนมัติหรือไม่\n// โดยเช็คว่า input ใน Primary Colors ต้องมีรหัส HEX ความยาว 6 ตัวอักษร\ncy.get(&#x27;.color-group&#x27;).contains(&#x27;Primary Colors&#x27;).parent().find(&#x27;input[type=\&quot;text\&quot;]&#x27;).invoke(&#x27;val&#x27;).should(&#x27;have.length&#x27;, 6);&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;f78b74f7-d603-429d-9796-1a5c74b04787&quot;,&quot;parentUUID&quot;:&quot;bcf6be2b-7013-489d-849b-a7bd2de4350b&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false}],&quot;suites&quot;:[],&quot;passes&quot;:[&quot;f78b74f7-d603-429d-9796-1a5c74b04787&quot;],&quot;failures&quot;:[],&quot;pending&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:1734,&quot;root&quot;:false,&quot;rootEmpty&quot;:false,&quot;_timeout&quot;:2000}],&quot;passes&quot;:[],&quot;failures&quot;:[],&quot;pending&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:0,&quot;root&quot;:true,&quot;rootEmpty&quot;:true,&quot;_timeout&quot;:2000}],&quot;meta&quot;:{&quot;mocha&quot;:{&quot;version&quot;:
