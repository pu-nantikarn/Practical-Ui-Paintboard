:&quot;9b4e7c18-2823-4fd2-a0a3-231b94b4457f&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;2. สามารถลากสีจากแผงควบคุม ไปวางในช่องสีหลักได้ (Drag &amp; Drop)&quot;,&quot;fullTitle&quot;:&quot;Image Color Extraction &amp; UI Interaction Test 2. สามารถลากสีจากแผงควบคุม ไปวางในช่องสีหลักได้ (Drag &amp; Drop)&quot;,&quot;duration&quot;:818,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;cy.get(&#x27;.toggle-all-colors-btn&#x27;).click();\n// เลือกสีแรกจากแผงควบคุมสี\ncy.get(&#x27;.all-color-item&#x27;).first().then($el =&gt; {\n  const colorHex = $el.find(&#x27;span&#x27;).text().replace(&#x27;#&#x27;, &#x27;&#x27;);\n  // จำลองการ Drag and Drop โดยใช้ DataTransfer Object\n  const dataTransfer = new DataTransfer();\n  cy.wrap($el).trigger(&#x27;dragstart&#x27;, {\n    dataTransfer\n  });\n  // วาง (Drop) ลงในช่อง Primary Color\n  cy.get(&#x27;.color-group&#x27;).first().find(&#x27;.input-wrapper&#x27;).trigger(&#x27;drop&#x27;, {\n    dataTransfer: {\n      getData: () =&gt; colorHex\n    }\n  });\n  // ตรวจสอบว่าค่าใน Input เปลี่ยนเป็นรหัสสีที่ลากมา\n  cy.get(&#x27;.color-group&#x27;).first().find(&#x27;input&#x27;).should(&#x27;have.value&#x27;, colorHex);\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;c2c77a5c-7f66-4a9f-8743-2d8e0138c127&quot;,&quot;parentUUID&quot;:&quot;9b4e7c18-2823-4fd2-a0a3-231b94b4457f&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;3. กดปุ่ม Shuffle Colors แล้วช่องสีมีการเปลี่ยนแปลง&quot;,&quot;fullTitle&quot;:&quot;Image Color Extraction &amp; UI Interaction Test 3. กดปุ่ม Shuffle Colors แล้วช่องสีมีการเปลี่ยนแปลง&quot;,&quot;duration&quot;:707,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;// เก็บค่าสีเดิมก่อนกด Shuffle\ncy.get(&#x27;.color-group&#x27;).first().find(&#x27;input&#x27;).invoke(&#x27;val&#x27;).then(oldPrimary =&gt; {\n  // ตรวจสอบว่าปุ่ม Shuffle ปรากฏขึ้นและกดปุ่ม\n  cy.get(&#x27;.shuffle-btn&#x27;).scrollIntoView() // เลื่อนไปให้เห็นปุ่ม\n  .should(&#x27;be.visible&#x27;).click();\n  // ตรวจสอบว่าค่าสีใหม่ไม่เหมือนกับค่าสีเดิม (กรณีที่สกัดได้หลายสี)\n  cy.get(&#x27;.color-group&#x27;).first().find(&#x27;input&#x27;).should(&#x27;not.have.value&#x27;, oldPrimary);\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;e6684e85-717a-45d0-9c8f-ba249337afd6&quot;,&quot;parentUUID&quot;:&quot;9b4e7c18-2823-4fd2-a0a3-231b94b4457f&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;4. หน้า preview dashboard มีการเปลี่ยนสีตามสีที่เปลี่ยนไปเมื่อกดปุ่ม shuffle&quot;,&quot;fullTitle&quot;:&quot;Image Color Extraction &amp; UI Interaction Test 4. หน้า preview dashboard มีการเปลี่ยนสีตามสีที่เปลี่ยนไปเมื่อกดปุ่ม shuffle&quot;,&quot;duration&quot;:1220,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;// กด Shuffle เพื่อเปลี่ยนสีชุดใหม่\ncy.get(&#x27;.shuffle-btn&#x27;).scrollIntoView() // เลื่อนไปให้เห็นปุ่ม\n.should(&#x27;be.visible&#x27;).click();\ncy.wait(500);\ncy.get(&#x27;.color-group&#x27;).first().find(&#x27;input&#x27;).invoke(&#x27;val&#x27;).then(currentHex =&gt; {\n  const expectedRgb = hexToRgb(currentHex);\n  // 2. ตรวจสอบ \&quot;ไอคอน KPI ตัวแรก\&quot; เพราะในโค้ดใช้ pColor แน่นอน\n  // หมายเหตุ: เช็ค &#x27;color&#x27; ไม่ใช่ &#x27;background-color&#x27; ตามที่เขียนใน PreviewDashboard\n  cy.get(&#x27;.kpi-icon&#x27;).first().should(&#x27;have.css&#x27;, &#x27;color&#x27;, `rgb(${expectedRgb.r}, ${expectedRgb.g}, ${expectedRgb.b})`);\n  // 3. หากจะเช็คจุดใน Gauge Chart ต้องมั่นใจว่าเป็นตัวที่ใช้ pColor \n  // หรือเลี่ยงไปเช็ค \&quot;เส้นกราฟเส้นแรก\&quot; แทนครับ\n  cy.get(&#x27;.mock-line-chart polyline&#x27;).first().should(&#x27;have.attr&#x27;, &#x27;stroke&#x27;, `#${currentHex}`);\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;4ad918e7-043d-4808-9292-7900048f9697&quot;,&quot;parentUUID&quot;:&quot;9b4e7c18-2823-4fd2-a0a3-231b94b4457f&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false}],&quot;suites&quot;:[],&quot;passes&quot;:[&quot;8ad0d876-d829-4b9d-8c9d-344dcbf95a27&quot;,&quot;c2c77a5c-7f66-4a9f-8743-2d8e0138c127&quot;,&quot;e6684e85-717a-45d0-9c8f-ba249337afd6&quot;,&quot;4ad918e7-043d-4808-9292-7900048f9697&quot;],&quot;failures&quot;:[],&quot;pending&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:3905,&quot;root&quot;:false,&quot;rootEmpty&quot;:false,&quot;_timeout&quot;:2000}],&quot;passes&quot;:[],&quot;failures&quot;:[],&quot;pending&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:0,&quot;root&quot;:true,&quot;rootEmpty&quot;:true,&quot;_timeout&quot;:2000}],&quot;meta&quot;:{&quot;mocha&quot;:{&quot;version&quot;:&quot;7.2.0&quot;},&quot;mochawesome&quot;:{&quot;options&quot;:{&quot;quiet&quot;:false,&quot;reportFilename&quot;:&quot;mochawesome&quot;,&quot;saveHtml&quot;:true,&quot;saveJson&quot;:false,&quot;consoleReporter&quot;:&quot;spec&quot;,&quot;useInlineDiffs&quot;:false,&quot;code&quot;:true},&quot;version&quot;:&quot;7.1.4&quot;},&quot;marge&quot;:{&quot;options&quot;:{&quot;reportDir&quot;:&quot;cypress/reports&quot;,&quot;overwrite&quot;:false,&quot;html&quot;:true,&quot;json&quot;:false,&quot;charts&quot;:true},&quot;version&quot;:&quot;6.3.2&quot;}}}"
