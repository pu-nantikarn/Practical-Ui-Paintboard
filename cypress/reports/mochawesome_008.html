    data-raw="{&quot;stats&quot;:{&quot;suites&quot;:1,&quot;tests&quot;:4,&quot;passes&quot;:4,&quot;pending&quot;:0,&quot;failures&quot;:0,&quot;start&quot;:&quot;2026-03-30T22:27:39.590Z&quot;,&quot;end&quot;:&quot;2026-03-30T22:27:45.928Z&quot;,&quot;duration&quot;:6338,&quot;testsRegistered&quot;:4,&quot;passPercent&quot;:100,&quot;pendingPercent&quot;:0,&quot;other&quot;:0,&quot;hasOther&quot;:false,&quot;skipped&quot;:0,&quot;hasSkipped&quot;:false},&quot;results&quot;:[{&quot;uuid&quot;:&quot;dfd6a01a-fbe4-465d-9773-7eefab42eef4&quot;,&quot;title&quot;:&quot;&quot;,&quot;fullFile&quot;:&quot;cypress\\e2e\\generate-color.cy.js&quot;,&quot;file&quot;:&quot;cypress\\e2e\\generate-color.cy.js&quot;,&quot;beforeHooks&quot;:[],&quot;afterHooks&quot;:[],&quot;tests&quot;:[],&quot;suites&quot;:[{&quot;uuid&quot;:&quot;c5751fd4-bd6f-44d4-91f7-b37316fbaa83&quot;,&quot;title&quot;:&quot;Generate Color Mode &amp; Dashboard Interaction Test&quot;,&quot;fullFile&quot;:&quot;&quot;,&quot;file&quot;:&quot;&quot;,&quot;beforeHooks&quot;:[],&quot;afterHooks&quot;:[],&quot;tests&quot;:[{&quot;title&quot;:&quot;1. สามารถสุ่มสีขึ้นมาได้หลายครั้ง แล้วช่องสีมีการแสดงขึ้นมา&quot;,&quot;fullTitle&quot;:&quot;Generate Color Mode &amp; Dashboard Interaction Test 1. สามารถสุ่มสีขึ้นมาได้หลายครั้ง แล้วช่องสีมีการแสดงขึ้นมา&quot;,&quot;duration&quot;:3538,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;// วนลูปกดปุ่ม Generate 10 ครั้ง เพื่อทดสอบความเสถียร\nfor (let n = 0; n &lt; 10; n++) {\n  // 1. เพิ่มการรอ (Wait) เล็กน้อยเพื่อให้ React อัปเดต State สีใหม่เสร็จก่อนตรวจสอบ\n  cy.get(&#x27;.generate-btn&#x27;).click().wait(200);\n  // 2. ปรับปรุงการตรวจสอบช่อง Primary\n  cy.get(&#x27;.color-group&#x27;).first().find(&#x27;input&#x27;).should($input =&gt; {\n    const val = $input.val();\n    // ตรวจสอบว่าต้องไม่เป็นค่าว่าง\n    expect(val).to.not.be.empty;\n    // แก้ Regex:\n    // - เติม ^#? เพื่อรองรับกรณีที่มีหรือไม่มีเครื่องหมาย # นำหน้า\n    // - เติม i เพื่อให้รองรับทั้งตัวพิมพ์เล็กและตัวพิมพ์ใหญ่ (Case-insensitive)\n    // - ตรวจสอบว่าต้องมี 6 หลัก\n    expect(val).to.match(/^#?[0-9A-Fa-f]{6}$/);\n  });\n  // 3. ตรวจสอบช่อง Secondary\n  cy.get(&#x27;.secondary-slots .input-wrapper&#x27;, {\n    timeout: 5000\n  }).should(&#x27;have.length.at.least&#x27;, 1);\n}&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;807ab46a-fbea-44d0-89b3-06fbe46c2ce6&quot;,&quot;parentUUID&quot;:&quot;c5751fd4-bd6f-44d4-91f7-b37316fbaa83&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;2. สามารถเลือกมู้ดสี แล้วช่องสีมีการแสดงขึ้นมา&quot;,&quot;fullTitle&quot;:&quot;Generate Color Mode &amp; Dashboard Interaction Test 2. สามารถเลือกมู้ดสี แล้วช่องสีมีการแสดงขึ้นมา&quot;,&quot;duration&quot;:377,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;// เลือกมู้ด &#x27;Pastel&#x27;\ncy.get(&#x27;.mood-btn&#x27;).contains(&#x27;Pastel&#x27;).click();\ncy.get(&#x27;.mood-btn&#x27;).contains(&#x27;Pastel&#x27;).should(&#x27;have.class&#x27;, &#x27;active&#x27;);\n// กด Generate ในมู้ด Pastel\ncy.get(&#x27;.generate-btn&#x27;).click();\n// ตรวจสอบว่ามีสีแสดงขึ้นมาในช่อง Input\ncy.get(&#x27;.color-group&#x27;).first().find(&#x27;input&#x27;).invoke(&#x27;val&#x27;).should(&#x27;not.be.empty&#x27;);&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;156b0f2a-6deb-47d3-a64b-1a9f7dc75ece&quot;,&quot;parentUUID&quot;:&quot;c5751fd4-bd6f-44d4-91f7-b37316fbaa83&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;3. กดปุ่ม generate color แล้วช่องสีมีการเปลี่ยนแปลง&quot;,&quot;fullTitle&quot;:&quot;Generate Color Mode &amp; Dashboard Interaction Test 3. กดปุ่ม generate color แล้วช่องสีมีการเปลี่ยนแปลง&quot;,&quot;duration&quot;:307,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;// ดึงค่าสีเดิมก่อนกด\ncy.get(&#x27;.color-group&#x27;).first().find(&#x27;input&#x27;).invoke(&#x27;val&#x27;).then(oldColor =&gt; {\n  // กดปุ่ม Generate\n  cy.get(&#x27;.generate-btn&#x27;).click();\n  // ตรวจสอบว่าค่าสีใหม่ \&quot;ต้องไม่เท่ากับ\&quot; ค่าสีเดิม\n  cy.get(&#x27;.color-group&#x27;).first().find(&#x27;input&#x27;).should(&#x27;not.have.value&#x27;, oldColor);\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;3d59a397-6e0f-417c-846f-cde88095dd11&quot;,&quot;parentUUID&quot;:&quot;c5751fd4-bd6f-44d4-91f7-b37316fbaa83&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;4. หน้า preview dashboard มีการเปลี่ยนสีตามสีที่เปลี่ยนไปเมื่อกดปุ่ม generate color&quot;,&quot;fullTitle&quot;:&quot;Generate Color Mode &amp; Dashboard Interaction Test 4. หน้า preview dashboard มีการเปลี่ยนสีตามสีที่เปลี่ยนไปเมื่อกดปุ่ม generate color&quot;,&quot;duration&quot;:291,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;// 1. กด Generate เพื่อเปลี่ยนสี\ncy.get(&#x27;.generate-btn&#x27;).click();\n// 2. อ่านค่าสีจากช่อง Primary ใน Sidebar\ncy.get(&#x27;.color-group&#x27;).first().find(&#x27;input&#x27;).invoke(&#x27;val&#x27;).then(currentHex =&gt; {\n  const rgb = hexToRgb(currentHex);\n  const expectedRgb = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;\n  // 3. ตรวจสอบว่าสีใน Dashboard เปลี่ยนตาม (เช็คที่ไอคอน KPI ตัวแรกซึ่งใช้ pColor)\n  cy.get(&#x27;.kpi-icon&#x27;).first().should(&#x27;have.css&#x27;, &#x27;color&#x27;, expectedRgb);\n  // 4. ตรวจสอบพื้นหลังของ Card ใน Dashboard ว่าใช้สีจาก Neutral shades หรือไม่\n  // ในโค้ด PreviewDashboard ใช้ bgCard = neutral[0]\n  cy.get(&#x27;.preview-dashboard&#x27;).should(&#x27;have.css&#x27;, &#x27;background-color&#x27;);\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;04db9ed1-4590-41bf-b70f-4328b97f37af&quot;,&quot;parentUUID&quot;:&quot;c5751fd4-bd6f-44d4-91f7-b37316fbaa83&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false}],&quot;suites&quot;:[],&quot;passes&quot;:[&quot;807ab46a-fbea-44d0-89b3-06fbe46c2ce6&quot;,&quot;156b0f2a-6deb-47d3-a64b-1a9f7dc75ece&quot;,&quot;3d59a397-6e0f-417c-846f-cde88095dd11&quot;,&quot;04db9ed1-4590-41bf-b70f-4328b97f37af&quot;],&quot;failures&quot;:[],&quot;pending&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:4513,&quot;root&quot;:false,&quot;rootEmpty&quot;:false,&quot;_timeout&quot;:2000}],&quot;passes&quot;:[],&quot;failures&quot;:[],&quot;pending&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:0,&quot;root&quot;:true,&quot;rootEmpty&quot;:true,&quot;_timeout&quot;:2000}],&quot;meta&quot;:{&quot;mocha&quot;:{&quot;version&quot;:&quot;7.2.0&quot;},&quot;mochawesome&quot;:{&quot;options&quot;:{&quot;quiet&quot;:false,&quot;reportFilename&quot;:&quot;mochawesome&quot;,&quot;saveHtml&quot;:true,&quot;saveJson&quot;:false,&quot;consoleReporter&quot;:&quot;spec&quot;,&quot;useInlineDiffs&quot;:false,&quot;code&quot;:true},&quot;version&quot;:&quot;7.1.4&quot;},&quot;marge&quot;:{&quot;options&quot;:{&quot;reportDir&quot;:&quot;cypress/reports&quot;,&quot;overwrite&quot;:false,&quot;html&quot;:true,&quot;json&quot;:false,&quot;charts&quot;:true},&quot;version&quot;:&quot;6.3.2&quot;}}}"
